<!DOCTYPE html>
<html lang="ko">
<head><script>window.API_BASE = "https://detail-page-studio-production.up.railway.app";</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Detail Page Studio</title>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>상세페이지 에디터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@400;600;700&family=Oswald:wght@500;600;700&family=DM+Mono:wght@400&family=Gmarket+Sans:wght@300;500;700&family=SUIT:wght@300;400;500;700;900&family=Nanum+Myeongjo:wght@400;700;800&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link rel="stylesheet" href="/editor.css">
</head>
<body>

<div id="topbar">
  <div class="font-picker" style="position:relative;">
    <button type="button" class="tb-select" id="font-picker-btn" onclick="fontPickerToggle(event)" style="display:flex;align-items:center;gap:6px;min-width:180px;justify-content:space-between;">
      <span id="font-picker-label" style="font-family:'Pretendard',sans-serif;">Pretendard (쿠팡/토스 ★)</span>
      <span style="font-size:9px;color:#888;">▾</span>
    </button>
    <div id="font-dropdown" onmouseleave="fontPickerRevert()" style="display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:240px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:9990;padding:4px;">
      <div class="font-opt" data-v="'Pretendard',sans-serif" data-l="Pretendard (쿠팡/토스 ★)" style="font-family:'Pretendard',sans-serif;">Pretendard <span style="opacity:.55;font-size:9px;">쿠팡 / 토스 ★</span></div>
      <div class="font-opt" data-v="'Noto Sans KR',sans-serif" data-l="Noto Sans KR (네이버)" style="font-family:'Noto Sans KR',sans-serif;">Noto Sans KR <span style="opacity:.55;font-size:9px;">네이버</span></div>
      <div class="font-opt" data-v="'Gothic A1',sans-serif" data-l="Gothic A1" style="font-family:'Gothic A1',sans-serif;">Gothic A1</div>
      <div class="font-opt" data-v="'Nanum Gothic',sans-serif" data-l="Nanum Gothic" style="font-family:'Nanum Gothic',sans-serif;">Nanum Gothic</div>
      <div class="font-opt" data-v="'Black Han Sans',sans-serif" data-l="Black Han Sans" style="font-family:'Black Han Sans',sans-serif;">Black Han Sans</div>
      <div class="font-opt" data-v="'Do Hyeon',sans-serif" data-l="Do Hyeon" style="font-family:'Do Hyeon',sans-serif;">Do Hyeon</div>
      <div class="font-opt" data-v="'Jua',sans-serif" data-l="Jua" style="font-family:'Jua',sans-serif;">Jua</div>
    </div>
  </div>
  <div class="tb-sep"></div>
  <button class="wb-btn" onclick="setW(480,this)">480px</button>
  <button class="wb-btn act" id="wb860" onclick="setW(860,this)">860px ★</button>
  <button class="wb-btn" onclick="setW(1080,this)">1080px</button>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" onclick="openAddModal()"><i class="ti ti-plus"></i> 섹션 추가</button>
  <div class="tb-spacer"></div>
  <button class="tb-btn" id="mb-preview-btn" onclick="toggleMobilePreview(this)"><i class="ti ti-device-mobile"></i> 모바일 보기</button>
  <button class="tb-btn orange" onclick="saveOptimized()" title="860px 모바일 최적화 (네이버/쿠팡 표준)"><i class="ti ti-device-mobile"></i> 모바일 JPG</button>
  <button class="tb-btn" onclick="saveJPG()" title="고해상도 (2580px)"><i class="ti ti-file-type-jpg"></i> JPG</button>
  <button class="tb-btn accent" onclick="saveHTML()"><i class="ti ti-file-code"></i> HTML</button>
  <button class="tb-btn" onclick="openTplModal()"><i class="ti ti-template"></i> 템플릿</button>
  <button class="tb-btn" onclick="document.getElementById('tpl-import-file').click()"><i class="ti ti-upload"></i> 불러오기</button>
  <input id="tpl-import-file" type="file" accept=".json,.html,.htm" style="display:none" onchange="if(this.files[0]){tplImportFile(this.files[0]); this.value='';}">
  <button class="tb-btn" onclick="switchTab('ai')"><i class="ti ti-wand"></i> AI</button>
</div>

<!-- 템플릿 모달 -->
<div id="tpl-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;align-items:center;justify-content:center;" onclick="if(event.target===this)closeTplModal()">
  <div style="background:#fff;width:520px;max-width:92vw;max-height:88vh;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden;">
    <div style="padding:18px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;">
      <div style="font-size:15px;font-weight:700;color:#111;">📑 템플릿 관리</div>
      <button onclick="closeTplModal()" style="background:none;border:none;font-size:18px;color:#888;cursor:pointer;">✕</button>
    </div>
    <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9;background:#fafbff;">
      <button onclick="tplNewDefault()" style="width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;">🆕 기본 템플릿으로 새로 시작 (21개 섹션)</button>
      <div style="font-size:10px;color:#94a3b8;margin-top:6px;text-align:center;">현재 작업이 모두 사라집니다 — 미리 저장하세요</div>
    </div>
    <div style="padding:16px 20px;border-bottom:1px solid #f1f5f9;">
      <div style="font-size:11px;font-weight:700;color:#475569;margin-bottom:6px;">현재 작업을 새 템플릿으로 저장</div>
      <div style="display:flex;gap:6px;">
        <input id="tpl-name-input" type="text" placeholder="예: 여름원피스 v1" style="flex:1;padding:8px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:12px;font-family:inherit;" onkeydown="if(event.key==='Enter')tplSaveCurrent()">
        <button onclick="tplSaveCurrent()" style="padding:8px 14px;background:#16a34a;color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">저장</button>
      </div>
      <div style="font-size:10px;color:#94a3b8;margin-top:6px;">💡 같은 이름으로 저장하면 덮어씁니다. 브라우저 저장공간 한계 시 JSON 다운로드 사용.</div>
    </div>
    <div style="padding:12px 20px 4px;font-size:11px;font-weight:700;color:#475569;">저장된 템플릿</div>
    <div id="tpl-list" style="flex:1;overflow-y:auto;padding:8px 20px 18px;"></div>
  </div>
</div>
<div id="body">
  <div id="center"><div id="preview" style="width:860px;"></div></div>
  <div id="right">
    <div class="tab-bar">
      <button class="tab-btn act" data-tab="ai" onclick="switchTab('ai')"><i class="ti ti-wand"></i>AI</button>
      <button class="tab-btn" data-tab="dl" onclick="switchTab('dl')"><i class="ti ti-download"></i>저장</button>
      <button class="tab-btn" data-tab="share" onclick="switchTab('share')"><i class="ti ti-info-circle"></i>공유</button>
    </div>
    <div class="tab-content">
      <div class="tab-pane act" id="tab-ai">
        <div class="ai-banner"><div class="ai-banner-title">🤖 AI 카피라이팅</div><div class="ai-banner-desc">제품 정보 입력 → 전체 섹션 자동 생성</div></div>
        <div class="rp-field"><label class="rp-label">브랜드명</label><input class="rp-input" id="ai-brand" value="브랜드명"></div>
        <div class="rp-field"><label class="rp-label">제품명</label><input class="rp-input" id="ai-product" value="제품명을 입력하세요"></div>
        <div class="rp-field"><label class="rp-label">카테고리</label><input class="rp-input" id="ai-category" value="의류/패션"></div>
        <div class="rp-field"><label class="rp-label">핵심기능</label><input class="rp-input" id="ai-features" value="기능1, 기능2, 기능3"></div>
        <div class="rp-field"><label class="rp-label">타겟 고객</label><input class="rp-input" id="ai-target" value="20-40대 여성"></div>
        <div class="rp-field"><label class="rp-label">분위기/톤</label><input class="rp-input" id="ai-tone" value="프리미엄·감성적"></div>
        <button class="ai-gen-btn" id="ai-gen-btn" onclick="aiGenerate()">✨ AI 카피 자동 생성</button>
        <div id="ai-result" style="display:none;"></div>
        <button id="ai-apply-btn" class="apply-btn" style="display:none;" onclick="aiApply()">🚀 모든 섹션에 적용</button>
      </div>
      <div class="tab-pane" id="tab-dl">
        <div class="dl-card">
          <div class="dl-card-title">🖼 이미지 저장</div>
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <button class="wb-btn act" id="jpg-1x" onclick="setJpgScale(1,this)">1× 표준</button>
            <button class="wb-btn" id="jpg-2x" onclick="setJpgScale(2,this)">2× 고화질</button>
          </div>
          <div class="dl-grid">
            <!-- 분할 저장 -->
        <div style="margin-bottom:12px;padding:10px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:8px;">
          <div style="font-size:10px;color:#818cf8;font-weight:800;letter-spacing:.1em;margin-bottom:8px;">✂ 분할 저장 (3500px 기준)</div>
          <button class="dl-btn" onclick="saveSplit(860,1,3500)" style="width:100%;margin-bottom:4px;background:#4f46e5;"><i class="ti ti-scissors"></i> 🖥 PC 분할 (1720px)</button>
        </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 이모지 피커 -->
<div id="ep" style="display:none;position:fixed;z-index:9100;background:#111827;border:1px solid #1f2937;border-radius:12px;padding:12px;width:300px;box-shadow:0 8px 32px rgba(0,0,0,.5);">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
    <span style="color:#e2e8f0;font-size:13px;font-weight:700;">아이콘 변경</span>
    <button onclick="closeEP()" style="background:none;border:none;color:#94a3b8;cursor:pointer;font-size:16px;">✕</button>
  </div>
  <input id="ep-input" type="text" placeholder="이모지 직접 입력 후 Enter" style="width:100%;background:#1f2937;border:1px solid #374151;border-radius:8px;color:#e2e8f0;padding:8px 10px;font-size:16px;margin-bottom:8px;box-sizing:border-box;" onkeydown="if(event.key==='Enter'){epSelect(this.value);}" />
  <div id="ep-cats" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;"></div>
  <div id="ep-grid" style="display:grid;grid-template-columns:repeat(8,1fr);gap:4px;max-height:200px;overflow-y:auto;"></div>
</div>

<!-- 플로팅 텍스트 툴바 -->
<div id="ft" style="display:none;position:fixed;z-index:9999;background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:5px 8px;align-items:center;gap:4px;box-shadow:0 4px 20px rgba(0,0,0,.4);">
  <!-- 폰트 종류 (호버 프리뷰 미니 픽커) -->
  <button id="ft-font-btn" title="폰트 변경" onclick="ftFontPickerToggle(event)" style="background:#1e293b;border:1px solid #334155;color:#cbd5e1;border-radius:5px;cursor:pointer;height:26px;padding:0 8px;font-size:11px;font-weight:700;font-family:inherit;">Aa <span style="font-size:8px;opacity:.6;">▾</span></button>
  <div id="ft-font-dropdown" onmouseleave="ftFontPickerRevert()" style="display:none;position:fixed;min-width:220px;background:#1a1a2e;border:1px solid #2a2a4a;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:99999;padding:4px;max-height:300px;overflow-y:auto;"></div>
  <div style="width:1px;height:20px;background:#334155;margin:0 2px;"></div>

  <!-- 사이즈 -->
  <button id="ft-szm" title="글자 작게" onclick="ftSz(-1)" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;font-size:14px;">−</button>
  <span id="ft-sz" style="color:#e2e8f0;font-size:11px;min-width:34px;text-align:center;font-family:'DM Mono',monospace;">16px</span>
  <button id="ft-szp" title="글자 크게" onclick="ftSz(1)" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;font-size:14px;">+</button>
  <div style="width:1px;height:20px;background:#334155;margin:0 2px;"></div>

  <!-- B / I -->
  <button id="ft-b" title="굵게" onclick="ftToggle('fontWeight','700','400')" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;font-weight:700;font-size:13px;">B</button>
  <button id="ft-i" title="기울임" onclick="ftToggle('fontStyle','italic','normal')" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;font-style:italic;font-size:13px;">I</button>
  <div style="width:1px;height:20px;background:#334155;margin:0 2px;"></div>

  <!-- 정렬 -->
  <button title="왼쪽 정렬" onclick="ftAlign('left')" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;"><i class="ti ti-align-left"></i></button>
  <button title="가운데 정렬" onclick="ftAlign('center')" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;"><i class="ti ti-align-center"></i></button>
  <button title="오른쪽 정렬" onclick="ftAlign('right')" style="background:#1e293b;border:1px solid #334155;color:#94a3b8;border-radius:5px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;"><i class="ti ti-align-right"></i></button>
  <div style="width:1px;height:20px;background:#334155;margin:0 2px;"></div>

  <!-- 색상 -->
  <input id="ft-color" type="color" value="#222222" oninput="ftColor(this.value)" onchange="ftColor(this.value)" style="width:26px;height:26px;border:1px solid #334155;border-radius:5px;cursor:pointer;padding:1px;background:#1e293b;" />
  <span id="ft-color-hex" style="color:#94a3b8;font-size:10px;font-family:'DM Mono',monospace;min-width:54px;">#222222</span>
</div>

<div id="hint" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(15,15,15,.9);color:#fff;padding:10px 20px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99999;white-space:nowrap;"></div>
<div id="add-modal">
  <div style="background:#fff;border-radius:16px;padding:28px;width:480px;max-width:90vw;max-height:80vh;overflow-y:auto;">
    <div style="font-size:18px;font-weight:800;margin-bottom:20px;">섹션 추가</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;">
      <button onclick="addSection('banner')" class="add-modal-btn">✨ 배너</button>
      <button onclick="addSection('hero')" class="add-modal-btn">🖼 히어로</button>
      <button onclick="addSection('copy')" class="add-modal-btn">💬 감성 카피</button>
      <button onclick="addSection('feat')" class="add-modal-btn">⭐ 기능 그리드</button>
      <button onclick="addSection('proof')" class="add-modal-btn">📊 소셜 증명</button>
      <button onclick="addSection('trust')" class="add-modal-btn">🛡️ 구매 안심</button>
      <button onclick="addSection('wearing')" class="add-modal-btn">👗 착용컷</button>
      <button onclick="addSection('mood')" class="add-modal-btn">🎨 무드컷</button>
      <button onclick="addSection('duo')" class="add-modal-btn">📐 2단 이미지</button>
      <button onclick="addSection('angle')" class="add-modal-btn">🔄 다각도</button>
      <button onclick="addSection('compare')" class="add-modal-btn">⚖️ 비교컷</button>
      <button onclick="addSection('story')" class="add-modal-btn">📖 소재 스토리</button>
      <button onclick="addSection('infl')" class="add-modal-btn">📸 인플루언서</button>
      <button onclick="addSection('style')" class="add-modal-btn">👠 스타일</button>
      <button onclick="addSection('pkg')" class="add-modal-btn">📦 패키지</button>
      <button onclick="addSection('size')" class="add-modal-btn">📏 사이즈</button>
      <button onclick="addSection('info')" class="add-modal-btn">ℹ️ 모델 정보</button>
      <button onclick="addSection('wash')" class="add-modal-btn">🧺 세탁 / 관리</button>
      <button onclick="addSection('pd')" class="add-modal-btn">📋 제품 정보 고시</button>
      <button onclick="addSection('faq')" class="add-modal-btn">❓ FAQ</button>
      <button onclick="addSection('footer')" class="add-modal-btn">📜 푸터</button>
    </div>
    <button onclick="closeAddModal()" style="width:100%;padding:12px;background:#f8f8f8;border:1px solid #e8e8e8;border-radius:9px;font-size:13px;color:#666;cursor:pointer;font-family:inherit;">취소</button>
  </div>
</div>

<!-- 저장 버튼 (서버 API 연동) -->
<script>
  // 저장 버튼 onclick 교체 - 서버 API 사용
  window.addEventListener('DOMContentLoaded', function(){
    // topbar 저장 버튼
    document.querySelectorAll('[onclick*="saveJPG"],[onclick*="savePNG"]').forEach(function(btn){
      btn.setAttribute('onclick', 'captureViaServer({format:"jpeg"})');
    });
  });
</script>
<script src="/editor.js"></script>
</body>
</html>
